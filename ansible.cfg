[defaults]
# Inventory — create inventory/hosts.ini (gitignored) with your host list
inventory         = inventory/hosts.ini
roles_path        = roles

# Output — YAML format is far more readable than the default for patch runs
stdout_callback   = yaml

# Performance — pipelining eliminates a round-trip per task; requires
# requiretty to be disabled in /etc/sudoers (the default on Ubuntu)
[ssh_connection]
pipelining        = True
ssh_args          = -o ControlMaster=auto -o ControlPersist=60s
