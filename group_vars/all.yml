---
# All times are in HH:MM 24-hour format, interpreted in the managed host's local timezone.
# The role validates all four window values at startup and fails with a clear message if:
#   - any value is not in HH:MM format
#   - a start time is not before its end time
#   - the reboot window does not fall within the maintenance window

# --- Maintenance Window ---
# If the playbook runs outside this window the host will wait (pausing Ansible)
# until the window opens, then proceed automatically.
ubuntu_patch_maintenance_window_start: "02:00"
ubuntu_patch_maintenance_window_end: "06:00"

# --- Reboot Window ---
# Must fall within the maintenance window (validated at startup).
# Reboot scheduling behaviour:
#   - If a reboot is required and the current time is BEFORE the reboot window:
#       a reboot is scheduled via 'at' to fire at ubuntu_patch_reboot_window_start.
#       A flag file at /var/run/ubuntu_patch_reboot_scheduled prevents a second 'at'
#       job being queued if the playbook re-runs before the reboot fires. The flag is
#       cleared automatically on reboot (tmpfs).
#   - If a reboot is required and the current time is WITHIN the reboot window:
#       the host is rebooted immediately (Ansible waits for it to come back).
#   - If a reboot is required and the reboot window has already PASSED:
#       a warning is logged; no reboot is issued (manual action required).
ubuntu_patch_reboot_window_start: "04:00"
ubuntu_patch_reboot_window_end: "06:00"

# Set to false to install patches but never reboot (useful for non-critical fleets).
ubuntu_patch_reboot_if_required: true

# --- Upgrade type ---
# Must be one of the four values below; the role fails immediately on any other value.
# upgrade  : apt upgrade — all pending updates, never installs new or removes existing packages (default)
# security : security updates only via unattended-upgrades
# full     : apt full-upgrade — all updates, may install new packages
# dist     : apt dist-upgrade — all updates, may install or remove packages
ubuntu_patch_upgrade_type: "upgrade"

# --- Pre-patch checks ---
# Minimum free disk space (MB) on / before patching begins. Fails fast rather
# than letting apt fail mid-upgrade with a full disk.
ubuntu_patch_min_free_disk_mb: 1024

# Maximum seconds to wait for the apt/dpkg lock before giving up.
# unattended-upgrades often holds the lock at patch time; waiting avoids
# false failures when the two overlap.
ubuntu_patch_apt_lock_timeout: 300

# --- Package holds ---
# Packages listed here are placed on hold before patching and released after.
# Useful for pinning kernels, drivers, or application packages on servers where
# an unexpected upgrade would require additional change-management steps.
# Example: [linux-generic, linux-image-generic, postgresql-16]
ubuntu_patch_held_packages: []

# --- Frozen repository (optional) ---
# Set to a full http/https URL to replace all apt source URIs before patching.
# Useful for ensuring every host in a fleet installs identical package versions.
# Example: "https://snapshot.ubuntu.com/ubuntu/20250501T000000Z"
# Leave empty (default) to use the existing configured mirrors.
# ubuntu_patch_frozen_repo_url: ""
