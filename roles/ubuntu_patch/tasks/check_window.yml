---
- name: Validate maintenance and reboot window configuration
  ansible.builtin.assert:
    that:
      - ubuntu_patch_maintenance_window_start is match('^\d{2}:\d{2}$')
      - ubuntu_patch_maintenance_window_end is match('^\d{2}:\d{2}$')
      - ubuntu_patch_reboot_window_start is match('^\d{2}:\d{2}$')
      - ubuntu_patch_reboot_window_end is match('^\d{2}:\d{2}$')
      - ubuntu_patch_maintenance_window_start < ubuntu_patch_maintenance_window_end
      - ubuntu_patch_reboot_window_start < ubuntu_patch_reboot_window_end
      - ubuntu_patch_reboot_window_start >= ubuntu_patch_maintenance_window_start
      - ubuntu_patch_reboot_window_end <= ubuntu_patch_maintenance_window_end
    fail_msg: >-
      Invalid window config: maintenance={{ ubuntu_patch_maintenance_window_start }}-{{ ubuntu_patch_maintenance_window_end }},
      reboot={{ ubuntu_patch_reboot_window_start }}-{{ ubuntu_patch_reboot_window_end }}.
      All times must be HH:MM (24-hour), start must precede end, and the reboot window must
      fall within the maintenance window.

- name: Gather date/time facts from managed host
  ansible.builtin.setup:
    gather_subset:
      - date_time

- name: Convert window boundaries and current time to minutes since midnight
  ansible.builtin.set_fact:
    ubuntu_patch__now_mins: "{{ ansible_facts['date_time'].hour | int * 60 + ansible_facts['date_time'].minute | int }}"
    ubuntu_patch__maint_start_mins: >-
      {{ ubuntu_patch_maintenance_window_start.split(':')[0] | int * 60
         + ubuntu_patch_maintenance_window_start.split(':')[1] | int }}
    ubuntu_patch__maint_end_mins: >-
      {{ ubuntu_patch_maintenance_window_end.split(':')[0] | int * 60
         + ubuntu_patch_maintenance_window_end.split(':')[1] | int }}

- name: Determine maintenance window position
  ansible.builtin.set_fact:
    ubuntu_patch__in_maintenance_window: >-
      {{ ubuntu_patch__now_mins | int >= ubuntu_patch__maint_start_mins | int and ubuntu_patch__now_mins | int < ubuntu_patch__maint_end_mins | int }}
    ubuntu_patch__before_maintenance_window: "{{ ubuntu_patch__now_mins | int < ubuntu_patch__maint_start_mins | int }}"
    ubuntu_patch__past_maintenance_window: "{{ ubuntu_patch__now_mins | int >= ubuntu_patch__maint_end_mins | int }}"

# Minutes until window start — same day if before, next day if window has passed
- name: Calculate seconds to wait (before window — same day)
  ansible.builtin.set_fact:
    ubuntu_patch__wait_seconds: "{{ (ubuntu_patch__maint_start_mins | int - ubuntu_patch__now_mins | int) * 60 }}"
  when: ubuntu_patch__before_maintenance_window | bool

- name: Calculate seconds to wait (past window — next day)
  ansible.builtin.set_fact:
    ubuntu_patch__wait_seconds: "{{ (1440 - ubuntu_patch__now_mins | int + ubuntu_patch__maint_start_mins | int) * 60 }}"
  when: ubuntu_patch__past_maintenance_window | bool

- name: Log wait until maintenance window opens
  ansible.builtin.debug:
    msg: >
      {{ inventory_hostname }} is outside the maintenance window
      ({{ ubuntu_patch_maintenance_window_start }}–{{ ubuntu_patch_maintenance_window_end }}).
      Current host time: {{ ansible_facts['date_time'].time }}.
      Waiting {{ (ubuntu_patch__wait_seconds | int // 60) }} minute(s) until window opens.
  when:
    - not ubuntu_patch__in_maintenance_window | bool
    - not ansible_check_mode

- name: Log that window wait is bypassed in check mode
  ansible.builtin.debug:
    msg: >
      CHECK MODE: {{ inventory_hostname }} is outside the maintenance window
      ({{ ubuntu_patch_maintenance_window_start }}–{{ ubuntu_patch_maintenance_window_end }}).
      Window wait bypassed — no changes will be made.
  when:
    - not ubuntu_patch__in_maintenance_window | bool
    - ansible_check_mode

- name: Wait until maintenance window opens
  ansible.builtin.pause:
    seconds: "{{ ubuntu_patch__wait_seconds | int }}"
  when:
    - not ubuntu_patch__in_maintenance_window | bool
    - not ansible_check_mode

# Refresh time facts after the wait so reboot window positions are accurate
- name: Re-gather date/time facts after waiting
  ansible.builtin.setup:
    gather_subset:
      - date_time
  when:
    - not ubuntu_patch__in_maintenance_window | bool
    - not ansible_check_mode

- name: Recalculate current time after wait
  ansible.builtin.set_fact:
    ubuntu_patch__now_mins: "{{ ansible_facts['date_time'].hour | int * 60 + ansible_facts['date_time'].minute | int }}"
  when:
    - not ubuntu_patch__in_maintenance_window | bool
    - not ansible_check_mode

- name: Determine reboot window position
  ansible.builtin.set_fact:
    ubuntu_patch__reboot_start_mins: "{{ ubuntu_patch_reboot_window_start.split(':')[0] | int * 60 + ubuntu_patch_reboot_window_start.split(':')[1] | int }}"
    ubuntu_patch__reboot_end_mins: "{{ ubuntu_patch_reboot_window_end.split(':')[0] | int * 60 + ubuntu_patch_reboot_window_end.split(':')[1] | int }}"

- name: Set reboot window position facts
  ansible.builtin.set_fact:
    ubuntu_patch__before_reboot_window: "{{ ubuntu_patch__now_mins | int < ubuntu_patch__reboot_start_mins | int }}"
    ubuntu_patch__in_reboot_window: >-
      {{ ubuntu_patch__now_mins | int >= ubuntu_patch__reboot_start_mins | int and ubuntu_patch__now_mins | int < ubuntu_patch__reboot_end_mins | int }}
    ubuntu_patch__past_reboot_window: "{{ ubuntu_patch__now_mins | int >= ubuntu_patch__reboot_end_mins | int }}"
